name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fails above the warning ceiling pinned in package.json (--max-warnings),
      # which is the total recorded in lint-baseline.json.
      - name: Lint
        run: npm run lint

      # Absolute (not relative) integrity of what this commit ships: re-lints and
      # fails unless the committed lint-baseline.json matches the live counts AND
      # exactly one --max-warnings pin equals that total. This is the only check
      # that runs when there is no base artifact to ratchet against — including
      # the rollout PR itself — so a malformed or inflated first baseline cannot
      # land, and clearing warnings without regenerating the baseline (leaving
      # budget for a later regression) fails here.
      - name: Lint baseline integrity
        run: npm run lint:baseline:check

      # The ratchet: the ceiling may fall but never rise. Compares this ref's
      # committed baseline with the previous one and checks that --max-warnings
      # still equals it, so the pin cannot be inflated to admit new warnings.
      # Artifact-to-artifact only — no second ESLint run. Runs on pushes too, so
      # a direct push to main is gated the same way a PR is.
      - name: Lint ratchet
        env:
          # PRs compare against the base branch; pushes against whatever was at
          # the tip beforehand.
          RATCHET_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.event.before }}
        run: |
          if [ -z "$RATCHET_BASE" ] || [ -z "${RATCHET_BASE//0/}" ]; then
            echo "No previous commit to compare against (new ref) — skipping."
            exit 0
          fi
          # Hard-fail if the base can't be fetched: swallowing the error would
          # leave a stale FETCH_HEAD (possibly the current commit) and compare
          # the baseline to itself, silently defeating the gate. A base.ref
          # branch is always reachable and a fast-forward push's `before` SHA
          # is too, so a failure here is a real anomaly, not routine.
          git fetch --no-tags --depth=1 origin "$RATCHET_BASE"
          # Only a base that genuinely predates the baseline is allowed to skip.
          # Probe the blob explicitly rather than inferring absence from an empty
          # file, so a fetch/show glitch can never masquerade as "no baseline".
          if git cat-file -e "FETCH_HEAD:lint-baseline.json" 2>/dev/null; then
            git show "FETCH_HEAD:lint-baseline.json" > "$RUNNER_TEMP/base-lint-baseline.json"
            node scripts/lint-baseline.mjs --against="$RUNNER_TEMP/base-lint-baseline.json"
          else
            echo "Base $RATCHET_BASE has no lint-baseline.json — nothing to ratchet against. Skipping."
          fi

      - name: Unit tests
        run: npm test -- --ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # tsc --noEmit over the whole project. The backlog (TASK-93 / PLAN-110) is
      # burned down and main is green (0 errors), so this is now a hard gate.
      - name: Typecheck
        run: npm run typecheck
